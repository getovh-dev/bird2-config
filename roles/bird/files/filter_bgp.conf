roa6 table rpki6;
attribute int export_downstream;

protocol static default_v6 {
    ipv6 {};
    route ::/0 reject;
}

define MY_ASN = 201541;

define LC_IXP_ID    = 1;
# (MY_ASN, LC_PEER_ASN, X): tag route received from neighbour with ASN X
define LC_PEER_ASN  = 2;
define LC_INFO      = 3;

# Community for BYOIP prefixes: (MY_ASN, LC_BYOIP, owner_asn)
define LC_BYOIP     = 20;

# Community used to block exporting prefixes to relationship groups
# Usage: (MY_ASN, LC_BLOCK_EXPORT, X) where X is:
#   1 - transit
#   2 - IXP
#   3 - peering
#   4 - downstreams
define LC_BLOCK_EXPORT = 666;

define BLOCK_TRANSIT = 1;
define BLOCK_IXP = 2;
define BLOCK_PEERING = 3;
define BLOCK_DOWNSTREAM = 4;

define LC_NO_EXPORT = 10;
define LC_PREPEND_1 = 11;
define LC_PREPEND_2 = 12;
define LC_PREPEND_3 = 13;

define LC_DOWNSTREAM_START  = 10;
define LC_DOWNSTREAM_END    = 13;

define INFO_PEER        = 100;
define INFO_IXP_RS      = 101;
define INFO_TRANSIT     = 102;
define INFO_DOWNSTREAM  = 103;
define INFO_SELF        = 104;
define INFO_IBGP        = 105;
define INFO_BYOIP       = 106;

define IPV6_BOGON = [
    ::/0,                   # Default
    ::/96,                  # IPv4-compatible IPv6 address - deprecated by RFC4291
    ::/128,                 # Unspecified address
    ::1/128,                # Local host loopback address
    ::ffff:0.0.0.0/96+,     # IPv4-mapped addresses
    ::224.0.0.0/100+,       # Compatible address (IPv4 format)
    ::127.0.0.0/104+,       # Compatible address (IPv4 format)
    ::0.0.0.0/104+,         # Compatible address (IPv4 format)
    ::255.0.0.0/104+,       # Compatible address (IPv4 format)
    0000::/8+,              # Pool used for unspecified, loopback and embedded IPv4 addresses
    0100::/8+,              # RFC 6666 - reserved for Discard-Only Address Block
    0200::/7+,              # OSI NSAP-mapped prefix set (RFC4548) - deprecated by RFC4048
    0400::/6+,              # RFC 4291 - Reserved by IETF
    0800::/5+,              # RFC 4291 - Reserved by IETF
    1000::/4+,              # RFC 4291 - Reserved by IETF
    2001:10::/28+,          # RFC 4843 - Deprecated (previously ORCHID)
    2001:20::/28+,          # RFC 7343 - ORCHIDv2
    2001:db8::/32+,         # Reserved by IANA for special purposes and documentation
    2002:e000::/20+,        # Invalid 6to4 packets (IPv4 multicast)
    2002:7f00::/24+,        # Invalid 6to4 packets (IPv4 loopback)
    2002:0000::/24+,        # Invalid 6to4 packets (IPv4 default)
    2002:ff00::/24+,        # Invalid 6to4 packets
    2002:0a00::/24+,        # Invalid 6to4 packets (IPv4 private 10.0.0.0/8 network)
    2002:ac10::/28+,        # Invalid 6to4 packets (IPv4 private 172.16.0.0/12 network)
    2002:c0a8::/32+,        # Invalid 6to4 packets (IPv4 private 192.168.0.0/16 network)
    3ffe::/16+,             # Former 6bone, now decommissioned
    4000::/3+,              # RFC 4291 - Reserved by IETF
    5f00::/8+,              # RFC 5156 - used for the 6bone but was returned
    6000::/3+,              # RFC 4291 - Reserved by IETF
    8000::/3+,              # RFC 4291 - Reserved by IETF
    a000::/3+,              # RFC 4291 - Reserved by IETF
    c000::/3+,              # RFC 4291 - Reserved by IETF
    e000::/4+,              # RFC 4291 - Reserved by IETF
    f000::/5+,              # RFC 4291 - Reserved by IETF
    f800::/6+,              # RFC 4291 - Reserved by IETF
    fc00::/7+,              # Unicast Unique Local Addresses (ULA) - RFC 4193
    fe80::/10+,             # Link-local Unicast
    fec0::/10+,             # Site-local Unicast - deprecated by RFC 3879 (replaced by ULA)
    ff00::/8+               # Multicast
];

define ASN_BOGON = [
    0,                      # RFC 7607
    23456,                  # RFC 4893 AS_TRANS
    64496..64511,           # RFC 5398 and documentation/example ASNs
    64512..65534,           # RFC 6996 Private ASNs
    65535,                  # RFC 7300 Last 16 bit ASN
    65536..65551,           # RFC 5398 and documentation/example ASNs
    65552..131071,          # RFC IANA reserved ASNs
    4200000000..4294967294, # RFC 6996 Private ASNs
    4294967295              # RFC 7300 Last 32 bit ASN
];

protocol rpki {
    roa6 { table rpki6; };
    transport tcp;
    remote "rtr.rpki.cloudflare.com" port 8282;
    retry keep 90;
    refresh keep 900;
    expire keep 172800;
}

function ip_bogon() {
    case net.type {
        NET_IP6: return net ~ IPV6_BOGON;
        else:    return true;
    }
}

function rpki_invalid() {
    case net.type {
        NET_IP6: return roa_check(rpki6, net, bgp_path.last) = ROA_INVALID;
        else:    return false;
    }
}

# Return the last ASN in the AS-PATH that is not a private/reserved ASN
function last_non_private_asn() {
    int last = 0;
    for int path_asn in bgp_path do {
        if path_asn !~ ASN_BOGON then last = path_asn;
    }
    return last;
}

function is_default_route() {
    case net.type {
        NET_IP6: return net = ::/0;
        else:    return false;
    }
}

function bad_prefix_len() {
    case net.type {
        NET_IP6: return net.len > 48;
        else:    return false;
    }
}

function clean_own_communities() {
    bgp_large_community.delete([
        (MY_ASN, LC_IXP_ID, *),
        (MY_ASN, LC_PEER_ASN, *),
        (MY_ASN, LC_INFO, INFO_PEER),
        (MY_ASN, LC_INFO, INFO_IXP_RS),
        (MY_ASN, LC_INFO, INFO_TRANSIT),
        (MY_ASN, LC_INFO, INFO_DOWNSTREAM),
        (MY_ASN, LC_INFO, INFO_SELF),
        (MY_ASN, LC_INFO, INFO_IBGP),
        (MY_ASN, LC_INFO, INFO_BYOIP),
        (MY_ASN, LC_BYOIP, *)
    ]);
}

function honour_graceful_shutdown() {
    # RFC 8326: Graceful BGP Session Shutdown
    if (65535, 0) ~ bgp_community then bgp_local_pref = 0;
}

function compute_local_pref(int base; int ping_ms; int speed_mbps) {
    int ping_penalty = ping_ms / 5;
    int speed_bonus = speed_mbps / 100;
    if speed_bonus > 100 then speed_bonus = 100;
    int as_path_penalty = 0;
    if bgp_path.len > 0 then as_path_penalty = bgp_path.len;

    int pref = base - ping_penalty + speed_bonus - as_path_penalty;
    if pref < 0 then pref = 0;
    if pref > 65535 then pref = 65535;
    return pref;
}

function handle_prepend(int dest_asn) {
    if (MY_ASN, LC_PREPEND_1, dest_asn) ~ bgp_large_community then {
        bgp_path.prepend(MY_ASN);
    }
    if (MY_ASN, LC_PREPEND_2, dest_asn) ~ bgp_large_community then {
        bgp_path.prepend(MY_ASN);
        bgp_path.prepend(MY_ASN);
    }
    if (MY_ASN, LC_PREPEND_3, dest_asn) ~ bgp_large_community then {
        bgp_path.prepend(MY_ASN);
        bgp_path.prepend(MY_ASN);
        bgp_path.prepend(MY_ASN);
    }
}

function import_safe(bool allow_default; bool skip_rpki) {
    if is_default_route() then {
        print proto, ": ", net, ": default-route import disabled";
        return false;
    }

    if ip_bogon() then {
        print proto, ": ", net, ": bogon prefix";
        return false;
    }

    if bgp_path ~ ASN_BOGON then {
        print proto, ": ", net, ": bogon in AS path: ", bgp_path;
        return false;
    }

    if bgp_path.len > 50 then {
        print proto, ": ", net, ": AS path too long: ", bgp_path;
        return false;
    }

    if bad_prefix_len() then {
        print proto, ": ", net, ": invalid prefix length";
        return false;
    }

    if (!skip_rpki && rpki_invalid()) then {
        print proto, ": ", net, ": invalid RPKI origin: ", bgp_path.last;
        return false;
    }

    export_downstream = 1;
    honour_graceful_shutdown();

    return true;
}

function import_peer_trusted(int peer_asn; int ping_ms; int speed_mbps) {
    clean_own_communities();
    bgp_large_community.add((MY_ASN, LC_INFO, INFO_PEER));
    bgp_large_community.add((MY_ASN, LC_PEER_ASN, peer_asn));
    bgp_local_pref = compute_local_pref(100, ping_ms, speed_mbps);
    return import_safe(false, false);
}

function import_ixp_trusted(int ixp_id; int remote_as; int ping_ms; int speed_mbps) {
    clean_own_communities();
    bgp_large_community.add((MY_ASN, LC_INFO, INFO_IXP_RS));
    bgp_large_community.add((MY_ASN, LC_IXP_ID, ixp_id));
    bgp_large_community.add((MY_ASN, LC_PEER_ASN, remote_as));
    bgp_local_pref = compute_local_pref(90, ping_ms, speed_mbps);
    return import_safe(false, false);
}

function import_transit(int transit_asn; bool default_route; int ping_ms; int speed_mbps) {
    clean_own_communities();
    bgp_large_community.add((MY_ASN, LC_INFO, INFO_TRANSIT));
    bgp_large_community.add((MY_ASN, LC_PEER_ASN, transit_asn));
    bgp_local_pref = compute_local_pref(50, ping_ms, speed_mbps);
    return import_safe(default_route, false);
}

function import_downstream_trusted(int downstream_asn; int ping_ms; int speed_mbps) {
    if (MY_ASN, LC_NO_EXPORT, MY_ASN) ~ bgp_large_community then {
        print proto, ": ", net, ": rejected by no-export to AS", MY_ASN;
        return false;
    }
    clean_own_communities();
    bgp_large_community.add((MY_ASN, LC_INFO, INFO_DOWNSTREAM));
    bgp_large_community.add((MY_ASN, LC_PEER_ASN, downstream_asn));
    bgp_local_pref = compute_local_pref(5000, ping_ms, speed_mbps);
    return import_safe(false, false);
}

function import_ibgp(int ping_ms; int speed_mbps) {
    bool had_self = (MY_ASN, LC_INFO, INFO_SELF) ~ bgp_large_community;
    bool had_downstream = (MY_ASN, LC_INFO, INFO_DOWNSTREAM) ~ bgp_large_community;

    if had_self then bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
    if had_downstream then bgp_large_community.add((MY_ASN, LC_INFO, INFO_DOWNSTREAM));

    bgp_large_community.add((MY_ASN, LC_INFO, INFO_IBGP));

    # Preserve block-export tags when learned via iBGP
    if (MY_ASN, LC_BLOCK_EXPORT, BLOCK_TRANSIT) ~ bgp_large_community then bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_TRANSIT));
    if (MY_ASN, LC_BLOCK_EXPORT, BLOCK_IXP) ~ bgp_large_community then bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_IXP));
    if (MY_ASN, LC_BLOCK_EXPORT, BLOCK_PEERING) ~ bgp_large_community then bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_PEERING));
    if (MY_ASN, LC_BLOCK_EXPORT, BLOCK_DOWNSTREAM) ~ bgp_large_community then bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_DOWNSTREAM));

    bgp_local_pref = compute_local_pref(40, ping_ms, speed_mbps);

    if had_self || had_downstream then {
        bgp_local_pref = bgp_local_pref + 1500;
        if bgp_local_pref > 65535 then bgp_local_pref = 65535;
    }

    return import_safe(false, had_self || had_downstream);
}

function export_to_downstream() {
    if (MY_ASN, LC_BLOCK_EXPORT, BLOCK_DOWNSTREAM) ~ bgp_large_community then return false;
    if is_default_route() then return false;
    if bad_prefix_len() then return false;

    if (defined(export_downstream) && export_downstream = 1) then return true;
    if source != RTS_STATIC then return true;

    return source = RTS_STATIC && (proto = "node_v6" || proto = "router_v6");
}

function export_monitoring() {
    return export_to_downstream();
}

function ibgp_export() {
    if is_default_route() then return false;
    if bad_prefix_len() then return false;

    if (source = RTS_STATIC && proto = "node_v6") then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
        bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_TRANSIT));
        bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_IXP));
        bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_PEERING));
    }

    if (source = RTS_STATIC && proto = "router_v6") then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
    }

    return true;
}

function ibgp_export_cone() {
    if (MY_ASN, LC_INFO, INFO_DOWNSTREAM) ~ bgp_large_community then return true;
    if (MY_ASN, LC_INFO, INFO_SELF) ~ bgp_large_community then return true;
    if (MY_ASN, LC_INFO, INFO_BYOIP) ~ bgp_large_community then return true;

    if (source = RTS_STATIC && proto = "node_v6") then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
        bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_TRANSIT));
        bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_IXP));
        bgp_large_community.add((MY_ASN, LC_BLOCK_EXPORT, BLOCK_PEERING));
        return true;
    }

    if (source = RTS_STATIC && proto = "router_v6") then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
        return true;
    }

    return false;
}

function export_cone(int dest_asn; int dest_type) {
    if (MY_ASN, LC_BLOCK_EXPORT, dest_type) ~ bgp_large_community then return false;
    if (MY_ASN, LC_NO_EXPORT, dest_asn) ~ bgp_large_community then return false;
    handle_prepend(dest_asn);

    if (MY_ASN, LC_INFO, INFO_DOWNSTREAM) ~ bgp_large_community then return true;
    if (MY_ASN, LC_INFO, INFO_SELF) ~ bgp_large_community then return true;
    if (MY_ASN, LC_INFO, INFO_BYOIP) ~ bgp_large_community then return true;

    if (source = RTS_STATIC && proto = "node_v6") then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
        return true;
    }
    if (source = RTS_STATIC && proto = "router_v6") then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
        return true;
    }
    return false;
}

function export_default() {
    case net.type {
        NET_IP6: return source = RTS_STATIC && proto = "default_v6";
        else:    return false;
    }
}

function export_our(int dest_asn; int dest_type) {
    if (MY_ASN, LC_BLOCK_EXPORT, dest_type) ~ bgp_large_community then return false;
    if (MY_ASN, LC_NO_EXPORT, dest_asn) ~ bgp_large_community then return false;

    if (MY_ASN, LC_INFO, INFO_SELF) ~ bgp_large_community then return true;
    if (MY_ASN, LC_INFO, INFO_BYOIP) ~ bgp_large_community then return true;

    if (source = RTS_STATIC && (proto = "node_v6" || proto = "router_v6")) then {
        bgp_large_community.add((MY_ASN, LC_INFO, INFO_SELF));
        return true;
    }
    return false;
}

function export_collector() {
    if is_default_route() then return false;
    if bad_prefix_len() then return false;
    return true;
}
